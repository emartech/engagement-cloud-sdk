name: Engagement Cloud SDK CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
  push:
    branches-ignore:
      - 'dependabot/**'
    tags-ignore:
      - '*'

env:
  USE_LOCAL_DEPENDENCY: ${{ vars.USE_LOCAL_DEPENDENCY }}
  GOOGLE_SERVICES_API_KEY: ${{ secrets.GOOGLE_SERVICES_API_KEY }}
  RELEASE_MODE: ${{ vars.RELEASE_MODE }}
  ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
  ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
  ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
  ANDROID_RELEASE_STORE_FILE_BASE64: ${{ secrets.ANDROID_RELEASE_STORE_FILE_BASE64 }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
  GOOGLE_OAUTH_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_SERVER_CLIENT_ID }}
  GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
  OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
  OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
  SONATYPE_STAGING_PROFILE_ID: ${{ secrets.SONATYPE_STAGING_PROFILE_ID }}
  SONATYPE_SIGNING_KEY_ID: ${{ secrets.SONATYPE_SIGNING_KEY_ID }}
  SONATYPE_SIGNING_PASSWORD: ${{ secrets.SONATYPE_SIGNING_PASSWORD }}
  SONATYPE_SIGNING_SECRET_KEY_RING_FILE: ${{ secrets.SONATYPE_SIGNING_SECRET_KEY_RING_FILE }}
  DETECT_LATEST_RELEASE_VERSION: ${{ vars.DETECT_LATEST_RELEASE_VERSION }}
  DETECT_PROJECT_USER_GROUPS: ${{ vars.DETECT_PROJECT_USER_GROUPS }}
  DETECT_PROJECT_VERSION_DISTRIBUTION: ${{ vars.DETECT_PROJECT_VERSION_DISTRIBUTION }}
  BLACKDUCK_ACCESS_TOKEN: ${{ secrets.BLACKDUCK_ACCESS_TOKEN }}
  BLACKDUCK_URL: ${{ vars.BLACKDUCK_URL }}
  SLACK_ICON: https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Kotlin_Icon.svg/1200px-Kotlin_Icon.svg.png
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  SPM_BUILD: ${{ vars.SPM_BUILD }}

jobs:
  derive-version:
    name: Derive Snapshot Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.snapshot-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive snapshot version
        id: snapshot-version
        run: |
          if git describe --tags --match '[0-9]*.[0-9]*.[0-9]*' >/dev/null 2>&1; then
            TAG=$(git describe --tags --match '[0-9]*.[0-9]*.[0-9]*' --abbrev=0)
            COMMITS=$(git rev-list "${TAG}..HEAD" --count)
            if [ "$COMMITS" -eq 0 ]; then
              VERSION="$TAG"
            else
              VERSION="${TAG}-${COMMITS}"
            fi
          else
            VERSION="0.0.0-${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: $VERSION"

  build:
    name: Build ${{ matrix.platform }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: web
            os: ubuntu-latest
          - platform: ios
            os: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Build
        run: make build-${{ matrix.platform }}

  test:
    name: Test ${{ matrix.platform }} / ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: web
            os: ubuntu-latest
          - platform: ios
            os: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Enable KVM group permissions
        if: matrix.platform == 'android'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android Emulator & Test
        if: matrix.platform == 'android'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          emulator-boot-timeout: 900
          ram-size: 2048M
          cores: 2
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            make test-android

      - name: Test iOS
        if: matrix.platform == 'ios'
        run: make test-ios

      - name: Setup Node.js
        if: matrix.platform == 'web'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Chrome
        if: matrix.platform == 'web'
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
          fi

      - name: Test Web
        if: matrix.platform == 'web'
        run: make test-web

  lint:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: make lint

  publish-android:
    name: Publish KMP Snapshot
    if: github.ref == 'refs/heads/main'
    needs: [derive-version, test, lint]
    runs-on: macos-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish to GitHub Packages
        run: make pipeline-android
        env:
          PUBLISH: true
          VERSION_OVERRIDE: ${{ needs.derive-version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}

  publish-js:
    name: Publish JS Snapshot
    if: github.ref == 'refs/heads/main'
    needs: [derive-version, test, lint]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@emartech'

      - name: Install npm dependencies
        run: npm install

      - name: Run JS Pipeline (Build, Test)
        run: make pipeline-js
        env:
          VERSION_OVERRIDE: ${{ needs.derive-version.outputs.version }}

      - name: Assemble NPM package
        run: |
          VERSION="${{ needs.derive-version.outputs.version }}"
          mkdir -p dist/npm
          cp engagement-cloud-sdk/build/dist/js/productionExecutable/engagement-cloud-sdk-html.js dist/npm/
          cp build/js/packages/engagement-cloud-sdk/kotlin/engagement-cloud-sdk-html.d.ts dist/npm/ 2>/dev/null || true
          sed "s/\"version\": \"0.0.0\"/\"version\": \"$VERSION\"/" \
            engagement-cloud-sdk/npm-package.json > dist/npm/package.json

      - name: Publish to GitHub Packages NPM
        run: npm publish dist/npm/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble snapshot CDN artifacts
        run: |
          mkdir -p dist/cdn/snapshots

          # Main SDK bundle + sourcemap
          cp engagement-cloud-sdk/build/dist/js/productionExecutable/engagement-cloud-sdk-html.js \
            dist/cdn/snapshots/engagement-cloud-sdk.js
          cp engagement-cloud-sdk/build/dist/js/productionExecutable/engagement-cloud-sdk-html.js.map \
            dist/cdn/snapshots/engagement-cloud-sdk.js.map 2>/dev/null || true

          # TypeScript definitions
          cp build/js/packages/engagement-cloud-sdk/kotlin/engagement-cloud-sdk-html.d.ts \
            dist/cdn/snapshots/engagement-cloud-sdk.d.ts 2>/dev/null || true

          # Loader script + sourcemap
          cp engagement-cloud-sdk/build/dist/js/productionExecutable/engagement-cloud-sdk-loader.js \
            dist/cdn/snapshots/engagement-cloud-sdk-loader.js
          cp engagement-cloud-sdk/build/dist/js/productionExecutable/engagement-cloud-sdk-loader.js.map \
            dist/cdn/snapshots/engagement-cloud-sdk-loader.js.map 2>/dev/null || true

          # Service worker + sourcemap
          cp web-push-service-worker/build/dist/js/productionExecutable/ec-service-worker.js \
            dist/cdn/snapshots/ec-service-worker.js
          cp web-push-service-worker/build/dist/js/productionExecutable/ec-service-worker.js.map \
            dist/cdn/snapshots/ec-service-worker.js.map 2>/dev/null || true

          echo "Snapshot CDN artifacts:"
          ls -la dist/cdn/snapshots/

      - name: Deploy snapshots to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/cdn
          keep_files: true
          destination_dir: .

  reporting:
    if: always()
    needs: [ build, test, lint, publish-android, publish-js ]
    runs-on: ubuntu-latest
    steps:
      - name: Report on Slack (Error)
        if: ${{ !cancelled() && contains(needs.*.result, 'failure') }}
        uses: megamegax/slack_action@0.3.1
        with:
          webhook_url: '${{env.SLACK_WEBHOOK}}'
          channel: 'mobile-team-ci'
          message: 'Last push build failed! :man-gesturing-no: :blobcatfearful:'
          user_name: 'Engagement Cloud SDK'
          job_status: 'failure'
          user_icon: '${{env.SLACK_ICON}}'
          actions: '[{ "type": "button", "text": "View actions", "url": "https://github.com/emartech/engagement-cloud-sdk/actions" }]'

      - name: Report on Slack (Success)
        if: ${{ !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'failure') }}
        uses: megamegax/slack_action@0.3.1
        with:
          webhook_url: '${{env.SLACK_WEBHOOK}}'
          channel: 'mobile-team-ci'
          message: 'Last push build successful! :man-gesturing-ok: :bananadance:'
          user_name: 'Engagement Cloud SDK'
          job_status: 'success'
          user_icon: '${{env.SLACK_ICON}}'
          actions: '[{ "type": "button", "text": "View actions", "url": "https://github.com/emartech/engagement-cloud-sdk/actions" }]'

      - name: Trigger automerge
        if: ${{ !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'failure') && github.event.pull_request != null && github.actor == 'dependabot[bot]' && github.event.pull_request.merged == false}}
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.AUTO_MERGE_TOKEN }}
          event-type: checks-complete
          client-payload: '{ "prNumber": "${{ github.event.pull_request.number }}"}'
