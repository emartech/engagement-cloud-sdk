name: Unified Engagement Cloud SDK Nightly CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  actions: read

env:
  USE_LOCAL_DEPENDENCY: ${{ vars.USE_LOCAL_DEPENDENCY }}
  GOOGLE_SERVICES_API_KEY: ${{ secrets.GOOGLE_SERVICES_API_KEY }}
  RELEASE_MODE: ${{ vars.RELEASE_MODE }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
  GOOGLE_OAUTH_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_SERVER_CLIENT_ID }}
  ANDROID_RELEASE_STORE_FILE_BASE64: ${{ secrets.ANDROID_RELEASE_STORE_FILE_BASE64 }}
  ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
  ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
  ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
  GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
  OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
  OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
  SONATYPE_STAGING_PROFILE_ID: ${{ secrets.SONATYPE_STAGING_PROFILE_ID }}
  SONATYPE_SIGNING_KEY_ID: ${{ secrets.SONATYPE_SIGNING_KEY_ID }}
  SONATYPE_SIGNING_PASSWORD: ${{ secrets.SONATYPE_SIGNING_PASSWORD }}
  SONATYPE_SIGNING_SECRET_KEY_RING_FILE: ${{ secrets.SONATYPE_SIGNING_SECRET_KEY_RING_FILE }}
  DETECT_LATEST_RELEASE_VERSION: ${{ vars.DETECT_LATEST_RELEASE_VERSION }}
  DETECT_PROJECT_USER_GROUPS: ${{ vars.DETECT_PROJECT_USER_GROUPS }}
  DETECT_PROJECT_VERSION_DISTRIBUTION: ${{ vars.DETECT_PROJECT_VERSION_DISTRIBUTION }}
  BLACKDUCK_ACCESS_TOKEN: ${{ secrets.BLACKDUCK_ACCESS_TOKEN }}
  BLACKDUCK_URL: ${{ vars.BLACKDUCK_URL }}
  SLACK_CHANNEL: mobile-team-ci
  SLACK_ICON: https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Kotlin_Icon.svg/1200px-Kotlin_Icon.svg.png
  SLACK_TITLE: Commit status
  SLACK_USERNAME: Engagement Cloud SDK
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  SPM_BUILD: ${{ vars.SPM_BUILD }}

jobs:
  build:
    name: Build ${{ matrix.platform }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: macos-latest-xlarge
          - platform: web
            os: ubuntu-latest
          - platform: ios
            os: macos-latest-xlarge

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Build
        run: make build-${{ matrix.platform }}

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: make lint

  test:
    name: Test ${{ matrix.platform }} / ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: macos-latest-xlarge
          - platform: web
            os: ubuntu-latest
          - platform: ios
            os: macos-latest-xlarge

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Add Google-Services.json from secret
        if: matrix.platform == 'android'
        uses: davidSchuppa/base64Secret-toFile-action@v3
        with:
          destination-path: androidApp/
          filename: google-services.json
          secret: ${{ env.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Authenticate to Google Cloud
        if: matrix.platform == 'android'
        uses: google-github-actions/auth@v3.0.0
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up Cloud SDK
        if: matrix.platform == 'android'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Create apks
        if: matrix.platform == 'android'
        run: make create-apks

      - name: Run Android tests on Firebase Test Lab
        if: matrix.platform == 'android'
        run: make test-android-firebase

      - name: Test iOS
        if: matrix.platform == 'ios'
        run: make test-ios

      - name: Setup Node.js
        if: matrix.platform == 'web'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Chrome
        if: matrix.platform == 'web'
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
              | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
              | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
          fi

      - name: Test Web
        if: matrix.platform == 'web'
        run: make test-web

  # E2E dispatch: non-blocking fire-and-report pattern.
  # Dispatches a repository_dispatch event to engagement-cloud-sdk-test-app.
  # The test-app may not have a receiving workflow yet -- dispatch returns 204
  # regardless, which is correct. When the test-app adds a workflow for
  # event_type "nightly-e2e", it will trigger automatically.
  # Requires E2E_DISPATCH_TOKEN secret (fine-grained PAT scoped to test-app
  # with actions:write and contents:read permissions).
  trigger-e2e:
    name: Trigger E2E Tests
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    needs: [build, test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch E2E to test-app
        id: dispatch
        run: |
          HTTP_CODE=$(curl -s -o /tmp/dispatch-response.txt -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.E2E_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/emartech/engagement-cloud-sdk-test-app/dispatches \
            -d '{"event_type":"nightly-e2e","client_payload":{"run_id":"${{ github.run_id }}"}}')

          echo "status=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" = "204" ]; then
            echo "E2E dispatch sent successfully to engagement-cloud-sdk-test-app"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::warning::E2E dispatch returned 404 -- target repo may not have a matching workflow yet"
          else
            echo "::warning::E2E dispatch returned unexpected status $HTTP_CODE"
          fi

  reporting:
    if: always()
    needs: [build, test, lint, trigger-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Report on Slack (Error)
        if: ${{ !cancelled() && contains(needs.*.result, 'failure') }}
        uses: megamegax/slack_action@0.3.1
        with:
          webhook_url: '${{env.SLACK_WEBHOOK}}'
          channel: '${{env.SLACK_CHANNEL}}'
          message: 'Nightly build failed! :man-gesturing-no: :blobcatfearful: (E2E dispatch skipped due to failures)'
          user_name: '${{env.SLACK_USERNAME}}'
          job_status: 'failure'
          user_icon: '${{env.SLACK_ICON}}'
          actions: '[{ "type": "button", "text": "View actions", "url": "https://github.com/emartech/engagement-cloud-sdk/actions" }]'

      - name: Report on Slack (Success)
        if: ${{ !contains(needs.*.result, 'cancelled') && !contains(needs.*.result, 'failure') }}
        uses: megamegax/slack_action@0.3.1
        with:
          webhook_url: '${{env.SLACK_WEBHOOK}}'
          channel: '${{env.SLACK_CHANNEL}}'
          message: 'Nightly build successful! :man-gesturing-ok: :bananadance: E2E dispatch: ${{ needs.trigger-e2e.result }}'
          user_name: '${{env.SLACK_USERNAME}}'
          job_status: 'success'
          user_icon: '${{env.SLACK_ICON}}'
          actions: '[{ "type": "button", "text": "View actions", "url": "https://github.com/emartech/engagement-cloud-sdk/actions" }]'
