name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '44 9 * * 0'

env:
  VERSION_OVERRIDE: 0.0.0-CODEQL
  USE_LOCAL_DEPENDENCY: ${{ vars.USE_LOCAL_DEPENDENCY }}
  RELEASE_MODE: ${{ vars.RELEASE_MODE }}
  GOOGLE_SERVICES_API_KEY: ${{ secrets.GOOGLE_SERVICES_API_KEY }}
  GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
  SPM_BUILD: ${{ vars.SPM_BUILD }}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: java-kotlin
          build-mode: manual
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4.35.1
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - if: matrix.build-mode == 'manual'
      run: |
        ./gradlew :engagement-cloud-sdk:compileAndroidMain \
          :engagement-cloud-sdk-android-fcm:assembleRelease \
          :engagement-cloud-sdk-android-hms:assembleRelease

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4.35.1
      with:
        category: "/language:${{matrix.language}}"
